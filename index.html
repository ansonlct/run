<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Apple Fitness 輔助追蹤器 (完美排版版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* 系統字體與背景 */
        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #000000; color: #ffffff; }
        
        #active-run-view { display: flex; flex-direction: column; height: 100%; width: 100%; }
        #summary-view, #history-view { display: none; flex-direction: column; height: 100%; width: 100%; background-color: #000; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 2000; position: absolute; top: 0; left: 0; }

        /* 防騎劫的大廳登入畫面 */
        #public-landing { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; text-align: center; }
        .landing-title { font-size: 32px; font-weight: 800; color: white; margin-bottom: 10px; }
        .landing-subtitle { font-size: 16px; color: #8e8e93; margin-bottom: 40px; font-weight: 600;}
        #manualRoomId { background-color: #1c1c1e; border: 1px solid #333; color: white; padding: 15px; font-size: 24px; font-weight: 800; text-align: center; border-radius: 12px; width: 80%; max-width: 300px; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase;}
        #manualRoomId:focus { outline: none; border-color: #32d7cb; }
        #joinLiveBtn { background-color: #34c759; color: white; padding: 15px 40px; border-radius: 25px; font-size: 18px; font-weight: 800; border: none; cursor: pointer; width: 80%; max-width: 300px; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4); }

        /* 🌟 導覽列與右側狀態區 */
        #top-nav { display: flex; justify-content: space-between; padding: 15px 20px 0 20px; align-items: center; z-index: 1000; background-color: #000;}
        .app-title { font-size: 22px; font-weight: 800; color: white; cursor: pointer; user-select: none; -webkit-user-select: none; letter-spacing: 0.5px; }
        #header-right { display: flex; align-items: center; }
        #openHistoryBtn { color: #32ade6; font-size: 16px; font-weight: 600; cursor: pointer; }
        
        /* 🌟 Live ID 徽章移至 Header 右側，採用霓虹邊框設計 */
        #liveSharePill { background-color: rgba(50, 215, 203, 0.15); color: #32d7cb; padding: 6px 12px; border-radius: 16px; font-size: 14px; font-weight: 700; border: 1px solid rgba(50, 215, 203, 0.4); cursor: pointer; display: none; transition: 0.2s; user-select: none; }
        #liveSharePill:active { background-color: rgba(50, 215, 203, 0.4); }
        #viewerBadge { background-color: rgba(255, 59, 48, 0.15); color: #ff3b30; padding: 6px 12px; border-radius: 16px; font-size: 14px; font-weight: 700; border: 1px solid rgba(255, 59, 48, 0.4); display: none; }

        /* 地圖區塊 */
        #map-container { position: relative; height: 42vh; margin: 15px 15px 5px 15px; border-radius: 20px; overflow: hidden; background-color: #1c1c1e; transition: all 0.3s ease; }
        #map { width: 100%; height: 100%; }
        #centerMapBtn { position: absolute; top: 15px; right: 15px; z-index: 1000; background-color: rgba(28, 28, 30, 0.8); backdrop-filter: blur(5px); border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; color: #32ade6; font-size: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); display: none; }
        #viewerCountBadge { position: absolute; top: 15px; left: 15px; z-index: 1500; background-color: rgba(28, 28, 30, 0.7); backdrop-filter: blur(5px); color: white; padding: 6px 12px; border-radius: 15px; font-size: 14px; font-weight: 800; display: none; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 2px 5px rgba(0,0,0,0.5); pointer-events: none; }

        /* 可拖曳與縮放的播報框 */
        #live-log-container { position: absolute; top: 70px; right: 15px; width: 220px; height: 250px; min-width: 150px; min-height: 100px; background-color: rgba(28, 28, 30, 0.85); backdrop-filter: blur(10px); border-radius: 12px; z-index: 2000; display: none; flex-direction: column; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.6); pointer-events: auto; resize: both; overflow: hidden; }
        #log-header { padding: 8px 10px; background-color: rgba(255,255,255,0.1); cursor: move; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 800; color: #32d7cb; user-select: none; touch-action: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #downloadLogBtn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 0; filter: grayscale(1) brightness(2); transition: 0.2s; }
        #downloadLogBtn:active { transform: scale(0.9); }
        
        /* 🌟 改為由上往下排版 */
        #log-content { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        #log-content::-webkit-scrollbar { width: 0; }
        .log-item { display: flex; flex-direction: column; animation: slideIn 0.3s ease-out forwards; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px; }
        .log-item:last-child { border-bottom: none; padding-bottom: 0; }
        .log-time { font-size: 11px; color: #8e8e93; font-weight: 800; margin-bottom: 2px; }
        .log-msg { font-size: 13px; font-weight: 700; color: white; line-height: 1.4; text-shadow: 0 1px 2px rgba(0,0,0,0.8);}
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* HUD 疊加層 */
        .map-overlay-left { position: absolute; bottom: 15px; left: 15px; z-index: 1000; font-size: 48px; font-weight: 800; text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 15px rgba(0,0,0,0.6); pointer-events: none; color: #ffe620; font-variant-numeric: tabular-nums; line-height: 1; transition: bottom 0.3s ease; }
        .map-overlay-right { position: absolute; bottom: 12px; right: 15px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 15px rgba(0,0,0,0.6); transition: bottom 0.3s ease; }
        .hud-stat { display: flex; align-items: baseline; gap: 10px; justify-content: flex-end; width: 100%; }
        .hud-label { font-size: 14px; color: rgba(255,255,255,0.9); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .hud-val { font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1;}
        .hud-val-dist { display: flex; align-items: baseline; justify-content: flex-end; font-size: 56px; font-weight: 800; color: #32ade6; font-variant-numeric: tabular-nums; line-height: 1; margin-top: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 15px rgba(0,0,0,0.6); }
        .hud-val-dist span:last-child { font-size: 36px; margin-left: 4px; font-weight: 800; color: #32ade6; }

        /* 數據與圖表區塊 */
        .fitness-section { padding: 10px 20px; border-bottom: 1px solid #1c1c1e; }
        .section-header { margin-bottom: 5px; }
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .chart-scroll-wrapper { width: 100%; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; margin-top: 5px; padding-bottom: 5px; }
        .chart-inner { position: relative; height: 70px; min-width: 100%; transition: width 0.3s ease; }

        /* 分段列表 */
        #splits-list { max-height: 12vh; overflow-y: auto; font-size: 15px; }
        .split-grid { display: grid; grid-template-columns: 15% 35% 25% 25%; padding: 8px 0; }
        .split-header-row { font-size: 12px; color: #8e8e93; font-weight: 600; border-bottom: 1px solid #1c1c1e; padding-bottom: 5px; margin-bottom: 5px; }
        .split-row { border-bottom: 1px solid #1c1c1e; align-items: center;}
        .split-grid span:nth-child(1) { text-align: left; font-weight: 800; color: white; }
        .split-grid span:nth-child(2) { text-align: left; font-weight: 800; color: #32d7cb; font-variant-numeric: tabular-nums;}
        .split-grid span:nth-child(3) { text-align: center; font-weight: 600; color: white; font-variant-numeric: tabular-nums;}
        .split-grid span:nth-child(4) { text-align: right; font-weight: 800; color: #ffe620; font-variant-numeric: tabular-nums; } 

        /* 控制按鈕 */
        #controls { padding: 10px 20px; padding-bottom: 30px; display: flex; flex-direction: column; gap: 15px; align-items: center; background: linear-gradient(transparent, rgba(0,0,0,0.9) 20%); }
        button { padding: 16px; font-size: 18px; border: none; border-radius: 28px; color: white; font-weight: 700; cursor: pointer; width: 100%; user-select: none; }
        #startBtn { background-color: #34c759; } 
        #pauseBtn { background-color: #ff9500; display: none; }

        /* 滑動結束拉桿 */
        #stopSliderTrack { position: relative; width: 100%; height: 56px; background-color: #2c2c2e; border-radius: 28px; display: none; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #3a3a3c; }
        #stopSliderText { color: #8e8e93; font-size: 16px; font-weight: 700; pointer-events: none; transition: opacity 0.2s; }
        #stopSliderHandle { position: absolute; left: 4px; top: 4px; width: 48px; height: 48px; border-radius: 24px; background-color: #ff3b30; display: flex; align-items: center; justify-content: center; cursor: grab; touch-action: none; transition: transform 0.3s ease-out; }
        #stopSliderHandle::after { content: ''; width: 10px; height: 10px; border-top: 3px solid white; border-right: 3px solid white; transform: rotate(45deg); margin-left: -3px; }

        /* GPS 指針 */
        .gps-indicator-wrapper { position: relative; width: 20px; height: 20px; pointer-events: none; }
        .gps-dot { width: 12px; height: 12px; background-color: #0a84ff; border: 3px solid white; border-radius: 50%; position: absolute; top: 4px; left: 4px; box-shadow: 0 0 5px rgba(0,0,0,0.5); z-index: 10; }
        .gps-pulse { width: 20px; height: 20px; border-radius: 50%; position: absolute; top: 0; left: 0; background-color: rgba(10, 132, 255, 0.4); animation: gps-pulse-animation 2s ease-out infinite; }
        @keyframes gps-pulse-animation { 0% { transform: scale(0.6); opacity: 1; } 100% { transform: scale(2.8); opacity: 0; } }
        .viewer-dot { width: 16px; height: 16px; background-color: #34c759; border: 3px solid white; border-radius: 50%; position: absolute; top: 2px; left: 2px; box-shadow: 0 0 8px rgba(0,0,0,0.8); z-index: 10; }

        /* 總結畫面 */
        .summary-title { font-size: 28px; font-weight: 800; text-align: center; margin-top: 20px; margin-bottom: 5px; } .summary-date { text-align: center; color: #8e8e93; font-size: 16px; margin-bottom: 20px; font-weight: 600;} .summary-card, .history-card { background-color: #1c1c1e; border-radius: 16px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; } .summary-grid, .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; } .summary-item { display: flex; flex-direction: column; z-index: 2; } .summary-item-label { color: #8e8e93; font-size: 12px; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; letter-spacing: 0.5px;} .summary-item-value { font-size: 22px; font-weight: 800; color: white; font-variant-numeric: tabular-nums;} .summary-item-value.blue { color: #32ade6; } .summary-item-value.yellow { color: #ffe620; } .summary-item-value.green { color: #34c759; } .summary-item-value.orange { color: #ff9500; } #doneBtn { background-color: #2c2c2e; width: 100%; margin-top: 10px; color: #32ade6; border-radius: 14px;} .history-header { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 25px; } .history-card { padding: 15px; display: flex; flex-direction: column; gap: 10px; } .history-date-row { color: #8e8e93; font-size: 14px; font-weight: 600; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; z-index: 2;} #summary-map { width: 100%; height: 180px; border-radius: 12px; margin-bottom: 15px; background-color: #111; z-index: 1; } .hist-map { width: 100%; height: 120px; border-radius: 10px; margin-bottom: 5px; background-color: #111; z-index: 1; pointer-events: none; } ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
</head>
<body>

    <div id="public-landing">
        <div class="landing-title">Apple Fitness Live</div>
        <div class="landing-subtitle">即時賽況追蹤系統</div>
        <input type="text" id="manualRoomId" placeholder="輸入 4 碼 Live ID" maxlength="4">
        <button id="joinLiveBtn">進入觀看模式</button>
    </div>

    <div id="active-run-view">
        
        <div id="top-nav">
            <div class="app-title" id="appTitle">輔助追蹤</div>
            <div id="header-right">
                <div id="openHistoryBtn">歷史紀錄</div>
                <div id="liveSharePill" title="點擊複製連結">📡 ID: ----</div>
                <div id="viewerBadge">🔴 觀看: ----</div>
            </div>
        </div>

        <div id="map-container">
            <div id="map"></div>
            <div id="centerMapBtn">⌖</div>
            <div id="viewerCountBadge">👁️ 0</div>
            
            <div id="live-log-container">
                <div id="log-header">
                    <span>≡ 賽況播報</span>
                    <button id="downloadLogBtn" title="下載記錄">📥</button>
                </div>
                <div id="log-content"></div>
            </div>

            <div class="map-overlay-left" id="val-time">00:00.00</div>
            <div class="map-overlay-right">
                <div class="hud-stat"><span class="hud-label">即時配速</span><span class="hud-val" id="val-current-pace" style="color:#32d7cb;">--:--</span></div>
                <div class="hud-stat"><span class="hud-label">平均配速</span><span class="hud-val" id="val-pace" style="color:white;">--:--</span></div>
                <div class="hud-stat"><span class="hud-label">活動大卡</span><span class="hud-val" id="val-cal" style="color:#ff9500;">0</span></div>
                <div class="hud-val-dist"><span id="val-dist">0.00</span><span>KM</span></div>
            </div>
        </div>

        <div class="fitness-section" id="chart-section">
            <div class="section-header"><div class="section-title">配速圖表 Pace</div></div>
            <div class="chart-scroll-wrapper" id="chart-scroll-wrapper"><div class="chart-inner" id="chart-inner"><canvas id="paceChart"></canvas></div></div>
        </div>

        <div class="fitness-section" id="split-section" style="flex-grow: 1; border-bottom: none;">
            <div class="section-header" style="display: flex; justify-content: space-between;"><div class="section-title">分段 Splits</div><div style="text-align: right;"><span class="section-title" style="font-size: 12px; color: #8e8e93;">總爬升</span> <span style="color: #34c759; font-weight: 800;" id="val-elev">0m</span></div></div>
            <div class="split-grid split-header-row" id="split-header-ui" style="display: none;"><span>公里</span><span>分段配速</span><span>平均配速</span><span>累計時間</span></div>
            <div id="splits-list"><div id="split-placeholder" style="color: #8e8e93; font-size: 13px; font-weight: 500; text-align: center; margin-top: 10px;">跑到 1km 後顯示分段紀錄</div></div>
        </div>

        <div id="controls">
            <button id="startBtn">開始跑步</button>
            <button id="pauseBtn">暫停</button>
            <div id="stopSliderTrack"><span id="stopSliderText">滑動來結束</span><div id="stopSliderHandle"></div></div>
        </div>
    </div>

    <div id="summary-view"><div class="summary-title">體能訓練總結</div><div class="summary-date" id="sum-date"></div><div class="summary-card"><div id="summary-map"></div><div class="summary-grid"><div class="summary-item" style="grid-column: span 2;"><div class="summary-item-label">總距離</div><div class="summary-item-value blue" style="font-size: 46px;" id="sum-dist">0.00 KM</div></div><div class="summary-item"><div class="summary-item-label">總時間</div><div class="summary-item-value yellow" id="sum-time">00:00.00</div></div><div class="summary-item"><div class="summary-item-label">活動大卡</div><div class="summary-item-value orange" id="sum-cal">0 KCAL</div></div><div class="summary-item"><div class="summary-item-label">平均配速</div><div class="summary-item-value" id="sum-pace">--:-- /KM</div></div><div class="summary-item"><div class="summary-item-label">總爬升</div><div class="summary-item-value green" id="sum-elev">0 m</div></div><div class="summary-item"><div class="summary-item-label">開始時間</div><div class="summary-item-value" id="sum-start-time" style="font-size: 18px;">--:--</div></div><div class="summary-item"><div class="summary-item-label">結束時間</div><div class="summary-item-value" id="sum-end-time" style="font-size: 18px;">--:--</div></div></div></div>
        <button id="downloadSummaryLogBtn" style="background:transparent; border:1px solid #32ade6; color:#32ade6; width:100%; padding:12px; border-radius:14px; margin-top:15px; font-weight:bold; font-size:16px; display:none;">📥 下載賽況日誌 (TXT)</button>
        <div style="text-align: center; color: #34c759; font-size: 14px; font-weight: 600; margin-top:15px;">紀錄與路線已安全儲存 ✓</div>
        <button id="doneBtn">完成</button>
    </div>
    <div id="history-view"><div class="history-header"><div class="summary-title" style="margin: 0;">歷史紀錄</div><div id="closeHistoryBtn" style="color: #32ade6; font-size: 16px; font-weight: 600; cursor: pointer;">完成</div></div><div id="history-list-container"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <script>
        // 🌟 Firebase 初始化
        const firebaseConfig = {
            apiKey: "AIzaSyAq99oJLPrCBHsY4k43CIDvaXAE6KJhpIA",
            authDomain: "runlivetracker-f72c2.firebaseapp.com",
            databaseURL: "https://runlivetracker-f72c2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "runlivetracker-f72c2",
            storageBucket: "runlivetracker-f72c2.firebasestorage.app",
            messagingSenderId: "221596002487",
            appId: "1:221596002487:web:cfbc675c9e2545828a8532"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, marker, pathLine, watchId = null, timerInterval = null, gpsCheckInterval = null;
        let pathCoordinates = [], totalDistance = 0, totalElevationGain = 0, lastAltitude = null, totalCalories = 0;
        let isPaused = false, accumulatedTime = 0, currentStartTime = null;
        let nextKmMarker = 1, lastKmSplitSeconds = 0, lastKmDistance = 0;
        let runStartTimeString = "--:--", runEndTimeString = "--:--";
        let paceChart = null, lastChartDistance = 0, lastChartSeconds = 0, recentPointsForPace = []; 
        let isDevMode = false, devSimInterval = null, devLat = 25.033964, devLng = 121.564468, devAlt = 10;
        let wakeLock = null, isMapFollowing = true; 

        let lastBearing = null, lastTurnDistance = 0, lastGpsTime = Date.now(), lastMoveTime = Date.now(), stoppedMinutes = 0, isGpsLost = false, isFirstPoint = true;
        let accuracyCircle = null, viewerAccCircle = null; 
        let runLogHistory = []; // 儲存日誌供下載

        let currentRoomId = null;
        const urlParams = new URLSearchParams(window.location.search);
        const watchRoomId = urlParams.get('watch'); 
        
        // 安全機制：檢查是否帶有 #runner 標籤
        const isSecretRunner = window.location.hash === '#runner'; 

        const domDist = document.getElementById('val-dist');
        const domTime = document.getElementById('val-time');
        const domPace = document.getElementById('val-pace');
        const domCurrentPace = document.getElementById('val-current-pace'); 
        const domElev = document.getElementById('val-elev');
        const domCal = document.getElementById('val-cal');
        const centerMapBtn = document.getElementById('centerMapBtn');
        const liveSharePill = document.getElementById('liveSharePill');
        const viewerBadge = document.getElementById('viewerBadge');
        const viewerCountBadge = document.getElementById('viewerCountBadge');
        
        const logContainer = document.getElementById('live-log-container');
        const logHeader = document.getElementById('log-header');
        const logContent = document.getElementById('log-content');
        const downloadLogBtn = document.getElementById('downloadLogBtn');
        const downloadSummaryLogBtn = document.getElementById('downloadSummaryLogBtn');
        
        const modernGpsIcon = L.divIcon({ className: 'gps-indicator-wrapper', html: '<div class="gps-pulse"></div><div class="gps-dot"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });
        const viewerGpsIcon = L.divIcon({ className: 'gps-indicator-wrapper', html: '<div class="viewer-dot"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });

        let titleClickCount = 0; let titleClickTimer = null;
        document.getElementById('appTitle').addEventListener('click', () => {
            titleClickCount++; clearTimeout(titleClickTimer); titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 1000);
            if (titleClickCount === 3) {
                if (prompt("請輸入密碼:") === "1234") { isDevMode = true; document.getElementById('appTitle').innerText = "輔助追蹤 (DEV)"; document.getElementById('appTitle').style.color = "#ff3b30"; alert("開發者模式啟動！"); }
                titleClickCount = 0;
            }
        });

        // 處理公開大廳登入按鈕
        document.getElementById('joinLiveBtn').addEventListener('click', () => {
            const inputId = document.getElementById('manualRoomId').value.trim().toUpperCase();
            if (inputId.length >= 4) {
                window.location.href = `${window.location.origin}${window.location.pathname}?watch=${inputId}`;
            } else { alert("請輸入正確的 4 碼 Live ID！"); }
        });

        // 下載日誌邏輯
        function triggerLogDownload() {
            if (runLogHistory.length === 0) return alert("目前沒有賽況記錄可下載！");
            const textContent = "==== Apple Fitness 賽況播報紀錄 ====\n" + runLogHistory.join('\n');

                        let r = Math.random(); if (r < 0.02) { devDirX = -devDirX; devDirY = -devDirY; } else if (r < 0.06) { let temp = devDirX; devDirX = -devDirY; devDirY = temp; }

            });

            pauseBtn.addEventListener('click', () => {

                else { isPaused = false; currentStartTime = Date.now(); recentPointsForPace = []; pauseBtn.innerText = '暫停'; pauseBtn.style.backgroundColor = '#ff9500'; lastMoveTime = Date.now(); pushLiveLog('▶️ 跑者繼續跑步'); if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(w=>wakeLock=w).catch(e=>{}); }

        const handle = document.getElementById('stopSliderHandle'); const track = document.getElementById('stopSliderTrack'); const sliderText = document.getElementById('stopSliderText');
        let isDragging = false; let startX = 0; let currentX = 0;
        handle.addEventListener('pointerdown', (e) => { isDragging = true; startX = e.clientX - currentX; handle.style.transition = 'none'; });
        window.addEventListener('pointermove', (e) => { if (!isDragging) return; currentX = e.clientX - startX; let maxDrag = track.clientWidth - handle.clientWidth - 8; if (currentX < 0) currentX = 0; if (currentX > maxDrag) currentX = maxDrag; handle.style.transform = `translateX(${currentX}px)`; sliderText.style.opacity = 1 - (currentX / maxDrag); });
        window.addEventListener('pointerup', () => { if (!isDragging) return; isDragging = false; let maxDrag = track.clientWidth - handle.clientWidth - 8; if (currentX > maxDrag * 0.85) { handle.style.transform = `translateX(${maxDrag}px)`; triggerStop(); setTimeout(()=>{isDragging=false;currentX=0;handle.style.transition='transform 0.3s ease-out';handle.style.transform='translateX(0)';sliderText.style.opacity=1;},300); } else { isDragging=false;currentX=0;handle.style.transition='transform 0.3s ease-out';handle.style.transform='translateX(0)';sliderText.style.opacity=1; }});
        window.addEventListener('pointercancel', () => { if(isDragging){isDragging=false;currentX=0;handle.style.transition='transform 0.3s ease-out';handle.style.transform='translateX(0)';sliderText.style.opacity=1;} });

        function calculateDistance(lat1, lon1, lat2, lon2) { const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180; const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
        function formatTime(totalSeconds) { const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0'); const s = (totalSeconds % 60).toString().padStart(2, '0'); return `${m}:${s}`; }
        function formatTimeWithMs(totalMs) { const totalSeconds = Math.floor(totalMs / 1000); const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0'); const s = (totalSeconds % 60).toString().padStart(2, '0'); const cs = Math.floor((totalMs % 1000) / 10).toString().padStart(2, '0'); return `${m}:${s}.${cs}`; }
        function getElapsedTime() { return (!currentStartTime || isPaused) ? accumulatedTime : accumulatedTime + (Date.now() - currentStartTime); }
        function getBearing(lat1, lon1, lat2, lon2) { const lat1Rad = lat1 * Math.PI / 180; const lat2Rad = lat2 * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180; const y = Math.sin(dLon) * Math.cos(lat2Rad); const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon); return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360; }

        function updateTimerAndPace() {
            const totalMs = getElapsedTime(); domTime.innerText = formatTimeWithMs(totalMs);
            if (totalDistance > 0) domPace.innerText = formatTime(Math.floor(Math.floor(totalMs / 1000) / totalDistance));
            if (currentRoomId && !watchRoomId && (totalMs % 1000 < 50)) db.ref(`rooms/${currentRoomId}/status`).update({ time: domTime.innerText, dist: domDist.innerText, pace: domPace.innerText, cPace: domCurrentPace.innerText, cal: domCal.innerText });
        }

        function checkAndRecordSplit(elapsedSeconds, lat, lng) {
            if (totalDistance >= nextKmMarker) {
                if(nextKmMarker === 1) { document.getElementById('split-header-ui').style.display = 'grid'; if(document.getElementById('split-placeholder')) document.getElementById('split-placeholder').style.display = 'none'; }
                const splitTimeSeconds = elapsedSeconds - lastKmSplitSeconds; const splitPaceSeconds = Math.floor(splitTimeSeconds / (totalDistance - lastKmDistance)); const avgPaceSeconds = Math.floor(elapsedSeconds / totalDistance);
                const splitRow = document.createElement('div'); splitRow.className = 'split-grid split-row';
                splitRow.innerHTML = `<span>${nextKmMarker}</span><span>${formatTime(splitPaceSeconds)} /KM</span><span>${formatTime(avgPaceSeconds)}</span><span>${formatTime(elapsedSeconds)}</span>`;
                document.getElementById('splits-list').prepend(splitRow);
                let kmStr = nextKmMarker; getStreetName(lat, lng).then(street => { pushLiveLog(`📍 完成 ${kmStr} KM！目前經過：${street}`); });
                nextKmMarker++; lastKmSplitSeconds = elapsedSeconds; lastKmDistance = totalDistance;

        function updateChartData(elapsedSeconds) {
            if (totalDistance - lastChartDistance >= 0.1) {
                let chartPaceSecs = Math.floor((elapsedSeconds - lastChartSeconds) / (totalDistance - lastChartDistance));
                if (chartPaceSecs > 1800) chartPaceSecs = 1800; if (chartPaceSecs < 120) chartPaceSecs = 120;
                if (paceChart.data.datasets[0].data.length >= paceChart.data.labels.length) { paceChart.data.labels.push((totalDistance).toFixed(1)); const currentPoints = paceChart.data.labels.length; if (currentPoints > 50) document.getElementById('chart-inner').style.width = (currentPoints / 50 * 100) + '%'; }
                paceChart.data.datasets[0].data.push(3600 / chartPaceSecs); paceChart.update();
                setTimeout(() => { const scrollWrapper = document.getElementById('chart-scroll-wrapper'); scrollWrapper.scrollLeft = scrollWrapper.scrollWidth; }, 50);

        function calculateCurrentPace(lat, lng, elapsedSeconds) {
            recentPointsForPace.push({ lat: lat, lng: lng, time: elapsedSeconds });
            recentPointsForPace = recentPointsForPace.filter(p => elapsedSeconds - p.time <= 10);
            if (recentPointsForPace.length >= 2) {
                const dTime = recentPointsForPace[recentPointsForPace.length - 1].time - recentPointsForPace[0].time; 
                const dDist = calculateDistance(recentPointsForPace[0].lat, recentPointsForPace[0].lng, lat, lng); 
                if (dDist > 0.005 && dTime > 0) domCurrentPace.innerText = formatTime(Math.min(Math.floor(dTime / dDist), 1800));
            }
        }

        function successLocation(position) {
            if (isPaused) return;
            const { latitude: lat, longitude: lng, altitude, accuracy } = position.coords;
            
            let radarColor = accuracy > 15 ? '#ff9500' : '#0a84ff';
            if (!accuracyCircle) accuracyCircle = L.circle([lat, lng], { radius: accuracy, color: radarColor, fillOpacity: 0.1, weight: 1 }).addTo(map);
            else { accuracyCircle.setLatLng([lat, lng]); accuracyCircle.setRadius(accuracy); accuracyCircle.setStyle({color: radarColor}); }

            if (accuracy > 40) return; 

            lastGpsTime = Date.now();
            if (isGpsLost) { isGpsLost = false; pushLiveLog('✅ GPS 訊號已恢復'); }

            if (isFirstPoint) { isFirstPoint = false; getStreetName(lat, lng).then(street => { pushLiveLog(`🚀 跑者已起跑！出發點：${street}`); }); }

            if (!marker) { marker = L.marker([lat, lng], {icon: modernGpsIcon}).addTo(map); map.setView([lat, lng], 17); } 
            else { marker.setLatLng([lat, lng]); if (isMapFollowing) map.panTo([lat, lng]); }

            const elapsedSeconds = Math.floor(getElapsedTime() / 1000);
            calculateCurrentPace(lat, lng, elapsedSeconds);

            if (pathCoordinates.length > 0) {
                const prevPt = pathCoordinates[pathCoordinates.length - 1];
                const distance = calculateDistance(prevPt[0], prevPt[1], lat, lng);
                
                if (pathCoordinates.length > 1) {
                    const currentBearing = getBearing(prevPt[0], prevPt[1], lat, lng);
                    if (lastBearing !== null) {
                        let diff = Math.abs(currentBearing - lastBearing);
                        if (diff > 180) diff = 360 - diff;
                        if (diff > 150 && totalDistance - lastTurnDistance > 0.05) {
                            getStreetName(lat, lng).then(street => { pushLiveLog(`🔄 跑者折返 (U-Turn)！目前於：${street}`); }); lastTurnDistance = totalDistance;
                        } else if (diff > 60 && totalDistance - lastTurnDistance > 0.05) {
                            getStreetName(lat, lng).then(street => { pushLiveLog(`↪️ 跑者轉彎進入：${street}`); }); lastTurnDistance = totalDistance;
                        }
                    }
                    lastBearing = currentBearing;
                }

                if (distance > 0.002) { 
                    if (stoppedMinutes > 0) { pushLiveLog(`▶️ 跑者重新出發！`); stoppedMinutes = 0; }
                    lastMoveTime = Date.now(); 

                    totalDistance += distance; totalCalories = Math.round(65 * totalDistance * 1.036);
                    domDist.innerText = totalDistance.toFixed(2); domCal.innerText = totalCalories;
                    if (currentRoomId && !watchRoomId) { db.ref(`rooms/${currentRoomId}/route`).push({ lat: lat, lng: lng }); db.ref(`rooms/${currentRoomId}/status`).update({ lat: lat, lng: lng, acc: accuracy }); }
                    checkAndRecordSplit(elapsedSeconds, lat, lng); updateChartData(elapsedSeconds);     
                }
            }
            if (altitude !== null) { if (lastAltitude !== null) { const elevDiff = altitude - lastAltitude; if (elevDiff > 1) { totalElevationGain += elevDiff; domElev.innerText = Math.round(totalElevationGain) + 'm'; } } lastAltitude = altitude; }
            pathCoordinates.push([lat, lng]); pathLine.setLatLngs(pathCoordinates);
        }

        function triggerStop() {

            if (devSimInterval !== null) { clearInterval(devSimInterval); devSimInterval = null; } 
            if (timerInterval !== null) clearInterval(timerInterval);
            if (gpsCheckInterval !== null) clearInterval(gpsCheckInterval);
            watchId = timerInterval = null; isPaused = false;
            if (wakeLock) wakeLock.release().then(()=>wakeLock=null); centerMapBtn.style.display = 'none';
            liveSharePill.style.display = 'none'; viewerCountBadge.style.display = 'none';

            if (currentRoomId) db.ref(`rooms/${currentRoomId}/status/time`).set("已結束");

            runEndTimeString = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            const finalDist = totalDistance.toFixed(2); const finalTime = formatTimeWithMs(getElapsedTime()).slice(0, 5); const finalAvgPace = domPace.innerText;
            const savedRoute = pathCoordinates.length <= 150 ? pathCoordinates : pathCoordinates.filter((_, index) => index % Math.ceil(pathCoordinates.length / 150) === 0);

            if (totalDistance > 0 || isDevMode) { 
                let history = JSON.parse(localStorage.getItem('ios_run_history') || '[]');
                history.unshift({ id: Date.now(), date: new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }), startTime: runStartTimeString, endTime: runEndTimeString, distance: finalDist, time: finalTime, pace: finalAvgPace, elevation: Math.round(totalElevationGain), calories: totalCalories, route: savedRoute });
                localStorage.setItem('ios_run_history', JSON.stringify(history));
            }

            document.getElementById('sum-date').innerText = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' }); document.getElementById('sum-dist').innerText = `${finalDist} KM`; document.getElementById('sum-time').innerText = domTime.innerText; document.getElementById('sum-pace').innerText = `${finalAvgPace} /KM`; document.getElementById('sum-elev').innerText = `${Math.round(totalElevationGain)} m`; document.getElementById('sum-cal').innerText = `${totalCalories} KCAL`; document.getElementById('sum-start-time').innerText = runStartTimeString; document.getElementById('sum-end-time').innerText = runEndTimeString;
            document.getElementById('active-run-view').style.display = 'none'; document.getElementById('summary-view').style.display = 'flex';
            
            if (!summaryMapInstance) { summaryMapInstance = L.map('summary-map', {zoomControl: false, dragging: false, touchZoom: false, scrollWheelZoom: false, doubleClickZoom: false, attributionControl: false}).setView([25.033, 121.564], 15); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(summaryMapInstance); summaryPathLayer = L.polyline([], {color: '#34c759', weight: 4, opacity: 1}).addTo(summaryMapInstance); }
            if (savedRoute && savedRoute.length > 0) { summaryPathLayer.setLatLngs(savedRoute); summaryMapInstance.fitBounds(summaryPathLayer.getBounds(), {padding: [15, 15]}); }
            setTimeout(() => summaryMapInstance.invalidateSize(), 100);
        }

        // 清除 Hash 重新載入，避免卡在跑者模式
        document.getElementById('doneBtn').addEventListener('click', () => { window.location.href = window.location.href.split('#')[0]; });

        document.getElementById('openHistoryBtn').addEventListener('click', () => { 
            historyMapInstances.forEach(m => m.remove()); historyMapInstances = [];
            const history = JSON.parse(localStorage.getItem('ios_run_history') || '[]');
            if (history.length === 0) { document.getElementById('history-list-container').innerHTML = '<div style="color:#8e8e93; text-align:center; margin-top:50px; font-size:16px;">尚無紀錄<br><br>開始你的第一趟跑步吧！</div>'; }
            else {
                document.getElementById('history-list-container').innerHTML = history.map(run => `<div class="history-card"><div class="history-date-row">${run.date} &nbsp; ( ${run.startTime} - ${run.endTime} )</div><div id="hist-map-${run.id}" class="hist-map"></div><div class="history-grid"><div class="summary-item"><div class="summary-item-label">距離</div><div class="summary-item-value blue" style="font-size: 26px;">${run.distance} KM</div></div><div class="summary-item"><div class="summary-item-label">時間</div><div class="summary-item-value yellow" style="font-size: 26px;">${run.time}</div></div><div class="summary-item"><div class="summary-item-label">大卡</div><div class="summary-item-value orange" style="font-size: 18px;">${run.calories || 0}</div></div><div class="summary-item"><div class="summary-item-label">配速</div><div class="summary-item-value" style="font-size: 18px;">${run.pace} /KM</div></div></div></div>`).join('');
                setTimeout(() => { history.forEach(run => { const mapId = `hist-map-${run.id}`; if (document.getElementById(mapId) && run.route && run.route.length > 0) { const m = L.map(mapId, {zoomControl: false, dragging: false, touchZoom: false, scrollWheelZoom: false, doubleClickZoom: false, attributionControl: false}); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(m); const pl = L.polyline(run.route, {color: '#34c759', weight: 3}).addTo(m); m.fitBounds(pl.getBounds(), {padding: [10, 10]}); historyMapInstances.push(m); } else if (document.getElementById(mapId)) document.getElementById(mapId).style.display = 'none'; }); }, 100); 
            }
            document.getElementById('active-run-view').style.display = 'none'; document.getElementById('history-view').style.display = 'flex'; 
        });
        document.getElementById('closeHistoryBtn').addEventListener('click', () => { document.getElementById('history-view').style.display = 'none'; document.getElementById('active-run-view').style.display = 'flex'; });

        window.onload = initApp;
    </script>
</body>
</html>
